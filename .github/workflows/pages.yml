name: Deploy game

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build game
        env:
          GHOST_BATTLE_SIGNALING_URL: wss://ghost-battle-signaling.connor-postma.workers.dev/match
          BINARYEN_VERSION: "130"
          BINARYEN_SHA256: 0a18362361ad05465118cd8eeb72edaeec89de6894bc283576ef4e07aa3babcc
        run: |
          cargo install wasm-bindgen-cli --version 0.2.88 --locked
          cargo build --locked --release --target wasm32-unknown-unknown
          mkdir -p site/out
          # wasm-bindgen bundles /src/cloudflare_net.js into out/snippets and
          # rewrites the generated import to that emitted module.
          wasm-bindgen --out-dir site/out --target web target/wasm32-unknown-unknown/release/wasm_battle_arena.wasm

          curl -fsSLO "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          echo "${BINARYEN_SHA256}  binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" | sha256sum -c -
          tar -xzf "binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          "binaryen-version_${BINARYEN_VERSION}/bin/wasm-opt" -Oz --strip-debug \
            site/out/wasm_battle_arena_bg.wasm -o site/out/wasm_battle_arena_bg.optimized.wasm
          mv site/out/wasm_battle_arena_bg.optimized.wasm site/out/wasm_battle_arena_bg.wasm

          cp index.html site/
          cd assets
          find . -type f \( -name '*.png' -o -name '*.ogg' \) \
            -exec install -D '{}' "../site/assets/{}" \;
          cd ..
          echo ghost.segfault.site > site/CNAME

          ! find site -type f \( -name '*.wav' -o -name '*.mp3' -o -name '*.bmp' \) | grep .
          {
            echo '### Deployment size'
            du -h site/out/wasm_battle_arena_bg.wasm
            find site/assets -type f -printf '%s\n' | awk '{n+=$1} END {print "Runtime assets: " n " bytes"}'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Install smoke-test browser
        run: |
          npm ci --ignore-scripts
          npx playwright install --with-deps chromium
      - name: Browser networking module contracts
        run: |
          npm run test:network-js
          npm run test:network-js:browser
      - name: In-game sync-test smoke
        run: bash scripts/run-ingame-smoke.sh
      - name: Mobile input smoke
        run: bash scripts/run-mobile-input-smoke.sh
      # Real transition tests intentionally build a separate feature-gated WASM
      # artifact and run a local Worker. The production Pages artifact above is
      # unchanged and contains no transition URL/bridge code.
      - name: Extended real WebRTC/GGRS transition smoke
        run: |
          cd cloudflare-worker
          npm ci --ignore-scripts
          cd ..
          npm run smoke:network-transition:all
      - name: Upload transition diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-transition-diagnostics
          path: artifacts/network-transition
          if-no-files-found: warn
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
